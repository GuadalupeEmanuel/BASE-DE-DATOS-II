<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contacto - Base de Datos II</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--primary:#ff3b3b;
--secondary:#ff8c00;
--text:#e5e5e5;
--nav-h:80px;
}

/* 🌌 FONDO GAMER */
body{
font-family:'Segoe UI',sans-serif;
background:
radial-gradient(circle at 20% 20%, rgba(255,0,0,0.15), transparent 40%),
radial-gradient(circle at 80% 30%, rgba(255,140,0,0.12), transparent 40%),
#050505;
color:var(--text);
overflow-x:hidden;
cursor:none;
}

/* 🔥 SOLO ANIMACIONES */
@keyframes fadeUp{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes slideDown{
from{
transform:translateY(-100%);
opacity:0;
}
to{
transform:translateY(0);
opacity:1;
}
}

/* 🔴 CURSOR */
.cursor-dot{
width:8px;
height:8px;
background:var(--primary);
border-radius:50%;
position:fixed;
transform:translate(-50%,-50%);
pointer-events:none;
z-index:9999;
box-shadow:0 0 10px var(--primary);
}

.cursor-outline{
width:30px;
height:30px;
border:2px solid rgba(255,59,59,0.6);
border-radius:50%;
position:fixed;
transform:translate(-50%,-50%);
pointer-events:none;
z-index:9998;
transition:0.08s ease;
}

/* 🚀 NAVBAR (FIX REAL SIN SALTO) */
.navbar{
position:fixed;
top:0;
width:100%;
height:var(--nav-h);
padding:0 60px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,0,0,0.25);
z-index:1000;

/* 🔥 FIX IMPORTANTE */
transform:translateY(-100%);
opacity:0;
animation:slideDown .5s ease forwards;
}

/* LOGO */
.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo img{
width:45px;
filter: drop-shadow(0 0 10px #ff3b3b);
}

.logo-text h2{color:var(--primary);}
.logo-text p{font-size:12px;color:#aaa;}
.logo-text span{font-size:11px;color:#777;}

/* MENU */
nav a{
margin-left:25px;
text-decoration:none;
color:#aaa;
transition:.2s;
position:relative;
}

nav a:hover{color:var(--primary);}

nav a::after{
content:"";
position:absolute;
left:0;
bottom:-5px;
width:0%;
height:2px;
background:var(--primary);
transition:.3s;
}

nav a:hover::after{width:100%;}

/* CONTENEDOR */
.container{
width:50%;
margin:140px auto 50px;
background:rgba(15,15,15,0.75);
backdrop-filter: blur(15px);
padding:35px;
border-radius:20px;
border:1px solid rgba(255,59,59,0.2);
box-shadow:0 0 25px rgba(255,59,59,0.25);
text-align:center;

opacity:0;
animation:fadeUp .6s ease forwards;
}

/* TITULO */
.titulo{
color:var(--primary);
font-size:30px;
text-shadow:0 0 10px var(--primary);
}

.linea{
width:80px;
height:3px;
background:var(--primary);
margin:10px auto;
border-radius:5px;
}

.descripcion{
color:#ccc;
margin-bottom:15px;
}

/* FORM */
.form-group{
text-align:left;
margin-bottom:15px;
}

input, textarea{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid rgba(255,59,59,0.2);
background:#0a0a0a;
color:#fff;
}

/* BOTON */
button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,var(--primary),var(--secondary));
cursor:pointer;
}

/* ALERTA */
.alerta{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
}

.alerta-box{
background:#111;
padding:30px;
border-radius:20px;
text-align:center;
}

</style>
</head>

<body>

<div class="cursor-dot"></div>
<div class="cursor-outline"></div>

<header class="navbar">

<div class="logo">
<img src="logo.png">
<div class="logo-text">
<h2>Base de Datos II</h2>
<p>Guadalupe Carbajal Emanuel Gaddiel</p>
<span>UPLA - Huancayo</span>
</div>
</div>

<nav>
<a href="index.html">Inicio</a>
<a href="semanas.html">Unidades</a>
<a href="contacto.html">Contacto</a>
<a href="login.html">Login</a>
</nav>

</header>

<section class="container">

<div class="titulo">✉️ Contáctanos</div>
<div class="linea"></div>

<form id="formulario">

<div class="form-group">
<input type="text" placeholder="Nombre" required>
</div>

<div class="form-group">
<input type="email" placeholder="Email" required>
</div>

<div class="form-group">
<input type="text" placeholder="Asunto" required>
</div>

<div class="form-group">
<textarea rows="4" placeholder="Mensaje" required></textarea>
</div>

<button>Enviar</button>

</form>

</section>

<div id="alerta" class="alerta">
<div class="alerta-box">
<h3>Mensaje enviado</h3>
<p>Respuesta en camino...</p>
</div>
</div>

<script>

const dot=document.querySelector(".cursor-dot");
const outline=document.querySelector(".cursor-outline");

document.addEventListener("mousemove",(e)=>{
dot.style.left=e.clientX+"px";
dot.style.top=e.clientY+"px";
outline.style.left=e.clientX+"px";
outline.style.top=e.clientY+"px";
});

const form=document.getElementById("formulario");

form.addEventListener("submit",e=>{
e.preventDefault();
document.getElementById("alerta").style.display="flex";
form.reset();

setTimeout(()=>{
document.getElementById("alerta").style.display="none";
},2500);
});

</script>

</body>
</html>
