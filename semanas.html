<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Semanas - Base de Datos II</title>

<style>

/* VARIABLES */
:root{
--azul-pastel:#93c5fd;
--azul-medio:#60a5fa;
--fondo-oscuro:#0f172a;
--gris-texto:#d1d5db;
}

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
background: linear-gradient(rgba(30, 41, 59, 0.75), rgba(15, 23, 42, 0.85)),
            url("inge.jpg");
background-size:cover;
background-position:center;
color:var(--gris-texto);
}

/* NAVBAR */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 70px;
background: rgba(255, 255, 255, 0.08);
backdrop-filter: blur(12px);
}

.logo h2{ color:var(--azul-pastel); }

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
gap:20px;
margin:30px;
}

.card{
background: rgba(255,255,255,0.05);
padding:20px;
border-radius:12px;
text-align:center;
cursor:pointer;
}

/* MODAL LISTA */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-content{
background: rgba(255,255,255,0.06);
padding:30px;
width:60%;
border-radius:20px;
}

.close{
position:absolute;
top:10px;
right:20px;
cursor:pointer;
}

/* VISOR PDF */
.viewer{
display:none;
position:fixed;
bottom:0;
left:0;
width:100%;
height:80%;
background:#000;
z-index:99999;
}

.viewer iframe{
width:100%;
height:100%;
border:none;
}

.viewer .cerrar{
position:absolute;
top:10px;
right:20px;
color:white;
font-size:20px;
cursor:pointer;
background:red;
padding:5px 10px;
border-radius:5px;
}

.modal-item{
margin:10px 0;
display:flex;
justify-content:space-between;
}

.btn-ver{
background:#60a5fa;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
}

.btn-descargar{
background:#22c55e;
padding:6px 10px;
border-radius:5px;
color:white;
text-decoration:none;
}

</style>
</head>

<body>

<header class="navbar">
<h2>Base de Datos II</h2>
</header>

<div class="grid">
<script>
for(let i=1;i<=16;i++){
document.write(`
<div class="card" onclick="abrirModal(${i})">
<h3>Semana ${i}</h3>
<p>Ver archivos</p>
</div>
`)
}
</script>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<span class="close" onclick="cerrarModal()">✖</span>
<h2 id="tituloModal"></h2>
<div id="linksModal"></div>
</div>
</div>

<!-- VISOR PDF -->
<div id="viewer" class="viewer">
<span class="cerrar" onclick="cerrarViewer()">✖ Cerrar</span>
<iframe id="pdfFrame"></iframe>
</div>

<script>

const BASE_URL = "https://raw.githubusercontent.com/GuadalupeEmanuel/BASE-DE-DATOS-II/main/";

const semanas = {
1: [
{nombre:"ARQUITECTURA DE BASE DE DATOS", archivo:"semana%201.pdf"}
]
};

function abrirModal(semana){
document.getElementById("modal").style.display="flex"

const ruta = BASE_URL + "semana" + semana + "/"
let contenido=""

if(semanas[semana]){
semanas[semana].forEach(file=>{
let url = ruta + file.archivo

contenido+=`
<div class="modal-item">
<span>📄 ${file.nombre}</span>
<div>
<button class="btn-ver" onclick="verPDF('${url}')">👁 Ver</button>
<a href="${url}" download class="btn-descargar">📥 Descargar</a>
</div>
</div>
`
})
}else{
contenido="<p>No hay archivos</p>"
}

document.getElementById("tituloModal").innerHTML="Semana "+semana
document.getElementById("linksModal").innerHTML=contenido
}

function cerrarModal(){
document.getElementById("modal").style.display="none"
}

/* 👁 VER PDF */
function verPDF(url){
document.getElementById("viewer").style.display="block"
document.getElementById("pdfFrame").src=url
}

/* ❌ CERRAR VISOR */
function cerrarViewer(){
document.getElementById("viewer").style.display="none"
document.getElementById("pdfFrame").src=""
}

</script>

</body>
</html>

</body>
</html>
