<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Semanas - Base de Datos II</title>

<style>

/* TODO TU CSS ORIGINAL (NO TOCADO) */
:root{
--azul-pastel:#93c5fd;
--azul-medio:#60a5fa;
--fondo-oscuro:#0f172a;
--gris-texto:#d1d5db;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
background: linear-gradient(rgba(30, 41, 59, 0.75), rgba(15, 23, 42, 0.85)),
            url("inge.jpg");
background-size:cover;
background-position:center;
color:var(--gris-texto);
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 70px;
background: rgba(255, 255, 255, 0.08);
backdrop-filter: blur(12px);
position:relative;
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo-img{
width:50px;
height:50px;
}

nav a{
color:var(--gris-texto);
text-decoration:none;
margin-left:30px;
font-weight:600;
font-size:18px;
}

.semanas-container{
width:90%;
max-width:1200px;
margin:30px auto;
background: rgba(255,255,255,0.05);
padding:25px;
border-radius:18px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background: rgba(255,255,255,0.05);
border-radius:12px;
padding:18px;
text-align:center;
cursor:pointer;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-content{
background: rgba(255,255,255,0.06);
padding:40px;
width:60%;
border-radius:20px;
}

.close{
position:absolute;
top:15px;
right:20px;
cursor:pointer;
}

.btn-ver{
background:#60a5fa;
padding:8px 14px;
border-radius:8px;
color:#000;
text-decoration:none;
margin-right:8px;
}

.btn-descargar{
background:#333;
padding:8px 14px;
border-radius:8px;
color:white;
text-decoration:none;
}

.modal-item{
margin:15px 0;
padding:15px;
background:rgba(255,255,255,0.05);
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

</style>
</head>

<body>

<header class="navbar">
<div class="logo">
<h2>Base de Datos II</h2>
</div>

<nav>
<a href="index.html">🏠 Inicio</a>
<a href="#" class="active">📅 Semanas</a>
<a href="contacto.html">✉️ Contacto</a>
<a href="login.html">🔒 Login</a>
</nav>
</header>

<section class="semanas-container">
<h1>Actividades por Semanas</h1>

<div class="grid">
<script>
for(let i=1;i<=16;i++){
document.write(`
<div class="card" onclick="abrirModal(${i})">
<h3>Semana ${i}</h3>
<p>Ver archivos</p>
</div>
`)
}
</script>
</div>

</section>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<span class="close" onclick="cerrarModal()">✖</span>
<h2 id="tituloModal"></h2>
<div id="linksModal"></div>
</div>
</div>

<script>

/* 🔥 USAMOS CDN CORRECTO (SOLUCIONA 404) */
const BASE_URL = "https://cdn.jsdelivr.net/gh/GuadalupeEmanuel/BASE-DE-DATOS-II@main/";

/* 🔥 TUS ARCHIVOS */
const semanas = {
1: [
    {
        nombre: "ARQUITECTURA DE BASE DE DATOS",
        archivo: "semana%201/semana%201.pdf"
    }
]
};

function abrirModal(semana){

const modal = document.getElementById("modal")
modal.style.display = "flex"

let contenido = ""

if(semanas[semana]){

semanas[semana].forEach(file=>{

let url = BASE_URL + file.archivo

contenido += `
<div class="modal-item">
<div>
<p><b>📄 ${file.nombre}</b></p>
</div>

<div>
<a href="${url}" target="_blank" class="btn-ver">👁 Ver</a>
<a href="${url}" download class="btn-descargar">📥 Descargar</a>
</div>

</div>
`
})

}else{
contenido = "<p>No hay archivos en esta semana</p>"
}

document.getElementById("tituloModal").innerHTML = "📅 Semana " + semana
document.getElementById("linksModal").innerHTML = contenido

}

function cerrarModal(){
document.getElementById("modal").style.display = "none"
}

window.onclick = function(e){
const modal = document.getElementById("modal")
if(e.target === modal){
modal.style.display = "none"
}
}

</script>

</body>
</html>
