<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Unidades - Base de Datos II</title>

<style>

/* VARIABLES */
:root{
--azul-pastel:#93c5fd;
--azul-medio:#60a5fa;
--fondo-oscuro:#0f172a;
--gris-texto:#d1d5db;
}

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
background: linear-gradient(rgba(30, 41, 59, 0.55), rgba(15, 23, 42, 0.65)),
            url("inge.jpg");
background-size:cover;
background-position:center;
color:var(--gris-texto);
}

/* NAVBAR */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 70px;
background: rgba(255, 255, 255, 0.08);
backdrop-filter: blur(12px);
}

/* LOGO */
.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo img{
width:50px;
height:50px;
}

.logo h2{
color:var(--azul-pastel);
}

.logo p{
font-size:14px;
opacity:0.8;
}

.logo span{
font-size:12px;
color:#9ca3af;
}

/* MENU */
nav a{
color:var(--gris-texto);
text-decoration:none;
margin-left:25px;
font-weight:600;
transition:0.3s;
}

nav a:hover{
color:var(--azul-pastel);
}

nav .active{
color:var(--azul-pastel);
}

/* CONTENEDOR */
.semanas-container{
width:90%;
max-width:1200px;
margin:40px auto;
background: rgba(255,255,255,0.05);
padding:30px;
border-radius:18px;
backdrop-filter: blur(10px);
}

h1{
text-align:center;
margin-bottom:30px;
}

/* UNIDADES */
.unidad{
margin-top:30px;
padding:14px;
text-align:center;
background: rgba(147,197,253,0.1);
border:1px solid rgba(147,197,253,0.3);
border-radius:10px;
font-weight:bold;
font-size:18px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
gap:20px;
margin-top:15px;
}

/* TARJETAS */
.card{
background: rgba(255,255,255,0.05);
border-radius:12px;
padding:20px;
text-align:center;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.07);
background: rgba(96,165,250,0.2);
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

.modal-content{
background: rgba(255,255,255,0.06);
padding:40px;
width:60%;
border-radius:20px;
position:relative;
animation:scaleIn 0.3s ease;
}

@keyframes scaleIn{
from{transform:scale(0.8);}
to{transform:scale(1);}
}

.close{
position:absolute;
top:15px;
right:20px;
cursor:pointer;
color:var(--azul-pastel);
font-size:20px;
}

/* BOTON VER */
.btn-ver{
background:#60a5fa;
padding:8px 14px;
border-radius:8px;
color:black;
text-decoration:none;
font-weight:bold;
}

/* ITEM */
.modal-item{
margin:15px 0;
padding:15px;
background:rgba(255,255,255,0.05);
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

</style>
</head>

<body>

<header class="navbar">

<div class="logo">
<img src="logo.png" alt="logo">
<div>
<h2>Base de Datos II</h2>
<p>Guadalupe Carbajal Emanuel Gaddiel</p>
<span>UPLA - Huancayo</span>
</div>
</div>

<nav>
<a href="index.html">🏠 Inicio</a>
<a href="#" class="active">📅 Unidades</a>
<a href="contacto.html">✉️ Contacto</a>
<a href="login.html">🔒 Login</a>
</nav>

</header>

<section class="semanas-container">
<h1>Actividades por Semanas</h1>
<div id="contenido"></div>
</section>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<span class="close" onclick="cerrarModal()">✖</span>
<h2 id="tituloModal"></h2>
<div id="linksModal"></div>
</div>
</div>

<script>

/* CDN */
const BASE_URL = "https://cdn.jsdelivr.net/gh/GuadalupeEmanuel/BASE-DE-DATOS-II@main/";

/* DATOS */
const semanas = {
1: [{ nombre: "Arquitectura de Base de Datos", archivo: "semana1/semana11.pdf" }],
2: [
{ nombre: "Analisis tecnico", archivo: "semana2/semana2.pdf" },
{ nombre: "Diagrama", archivo: "semana2/semana22.pdf" },
{ nombre: "Instalacion de SQL", archivo: "semana2/semana222.pdf" },
{ nombre: "Diagrama 2", archivo: "semana2/semana2222.pdf" }
],
3: [{ nombre: "Tema semana 3", archivo: "semana3/semana3.pdf" }],
4: [{ nombre: "Tema semana 4", archivo: "semana4/semana4.pdf" }],
5: [{ nombre: "Tema semana 5", archivo: "semana5/semana5.pdf" }],
6: [{ nombre: "Tema semana 6", archivo: "semana6/semana6.pdf" }],
7: [{ nombre: "Tema semana 7", archivo: "semana7/semana7.pdf" }],
8: [{ nombre: "Tema semana 8", archivo: "semana8/semana8.pdf" }],
9: [{ nombre: "Tema semana 9", archivo: "semana9/semana9.pdf" }],
10: [{ nombre: "Tema semana 10", archivo: "semana10/semana10.pdf" }],
11: [{ nombre: "Tema semana 11", archivo: "semana11/semana11.pdf" }],
12: [{ nombre: "Tema semana 12", archivo: "semana12/semana12.pdf" }],
13: [{ nombre: "Tema semana 13", archivo: "semana13/semana13.pdf" }],
14: [{ nombre: "Tema semana 14", archivo: "semana14/semana14.pdf" }],
15: [{ nombre: "Tema semana 15", archivo: "semana15/semana15.pdf" }],
16: [{ nombre: "Tema semana 16", archivo: "semana16/semana16.pdf" }]
};

/* UNIDADES */
const contenedor = document.getElementById("contenido");

const unidades = [
{nombre:"Unidad 1", inicio:1, fin:4},
{nombre:"Unidad 2", inicio:5, fin:8},
{nombre:"Unidad 3", inicio:9, fin:12},
{nombre:"Unidad 4", inicio:13, fin:16}
];

unidades.forEach(u => {

let html = `<div class="unidad">📘 ${u.nombre}</div>`;
html += `<div class="grid">`;

for(let i=u.inicio;i<=u.fin;i++){
html += `
<div class="card" onclick="abrirModal(${i})">
<h3>Semana ${i}</h3>
<p>Ver archivos</p>
</div>
`;
}

html += `</div>`;
contenedor.innerHTML += html;

});

/* MODAL */
function abrirModal(semana){

const modal = document.getElementById("modal");
modal.style.display = "flex";

let contenido="";

if(semanas[semana]){
semanas[semana].forEach(file=>{

let url = BASE_URL + file.archivo;

contenido+=`
<div class="modal-item">
<div>
<p><b>📄 ${file.nombre}</b></p>
</div>
<div>
<a href="${url}" target="_blank" class="btn-ver">👁 Ver</a>
</div>
</div>
`;
});
}else{
contenido="<p>No hay archivos</p>";
}

document.getElementById("tituloModal").innerHTML="📅 Semana "+semana;
document.getElementById("linksModal").innerHTML=contenido;
}

function cerrarModal(){
document.getElementById("modal").style.display="none";
}

window.onclick=function(e){
const modal=document.getElementById("modal");
if(e.target===modal){
modal.style.display="none";
}
}

</script>

</body>
</html>
