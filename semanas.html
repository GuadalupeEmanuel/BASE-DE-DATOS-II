<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Semanas - Base de Datos II</title>

<style>

:root{
--azul-pastel:#93c5fd;
--azul-medio:#60a5fa;
--gris-texto:#d1d5db;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
background: linear-gradient(rgba(30,41,59,0.75), rgba(15,23,42,0.85)),
            url("inge.jpg");
background-size:cover;
color:var(--gris-texto);
}

/* NAVBAR */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 70px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(12px);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

/* CARDS */
.card{
background: rgba(255,255,255,0.05);
padding:20px;
border-radius:12px;
text-align:center;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-content{
background: rgba(255,255,255,0.08);
padding:40px;
border-radius:20px;
width:60%;
max-width:700px;
position:relative;
}

.close{
position:absolute;
top:10px;
right:15px;
cursor:pointer;
}

/* ITEMS */
.modal-item{
display:flex;
justify-content:space-between;
align-items:center;
margin:15px 0;
padding:15px;
background:rgba(255,255,255,0.05);
border-radius:10px;
}

/* BOTONES */
.btn-ver{
background:#60a5fa;
padding:8px 12px;
border-radius:8px;
color:#000;
text-decoration:none;
margin-right:8px;
}

.btn-descargar{
background:#22c55e;
padding:8px 12px;
border-radius:8px;
color:white;
text-decoration:none;
}

</style>
</head>

<body>

<header class="navbar">
<h2>📘 Base de Datos II</h2>
</header>

<div class="grid">

<script>
for(let i=1;i<=16;i++){
document.write(`
<div class="card" onclick="abrirModal(${i})">
<h3>Semana ${i}</h3>
<p>Ver archivos</p>
</div>
`)
}
</script>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">

<span class="close" onclick="cerrarModal()">✖</span>

<h2 id="tituloModal"></h2>
<div id="linksModal"></div>

</div>
</div>

<script>

const semanas = {

    1: [
        {
            nombre: "ARQUITECTURA DE BASE DE DATOS",
            archivo: "semana%201.pdf"
        }
    ]

};

function abrirModal(semana){

const modal = document.getElementById("modal")
modal.style.display="flex"

let contenido=""

if(semanas[semana]){

semanas[semana].forEach(file=>{

let urlVer = "https://github.com/GuadalupeEmanuel/BASE-DE-DATOS-II/blob/main/semana" + semana + "/" + file.archivo.replace("%20"," ") + "?raw=true"

let urlDescarga = "https://raw.githubusercontent.com/GuadalupeEmanuel/BASE-DE-DATOS-II/main/semana" + semana + "/" + file.archivo

contenido+=`
<div class="modal-item">
<div>
<p><b>📄 ${file.nombre}</b></p>
<small>${file.archivo}</small>
</div>

<div>
<a href="${urlVer}" target="_blank" class="btn-ver">👁 Ver</a>
<a href="${urlDescarga}" download class="btn-descargar">📥 Descargar</a>
</div>
</div>
`
})

}else{
contenido="<p>No hay archivos en esta semana</p>"
}

document.getElementById("tituloModal").innerHTML="📅 Semana "+semana
document.getElementById("linksModal").innerHTML=contenido

}

function cerrarModal(){
document.getElementById("modal").style.display="none"
}

window.onclick=function(e){
const modal=document.getElementById("modal")
if(e.target===modal){
modal.style.display="none"
}
}

</script>

</body>
</html>
