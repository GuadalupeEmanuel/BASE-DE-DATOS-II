<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Semanas - Base de Datos II</title>

<style>

/* VARIABLES */
:root{
--azul-pastel:#93c5fd;
--azul-medio:#60a5fa;
--fondo-oscuro:#0f172a;
--gris-texto:#d1d5db;
}

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
background: linear-gradient(rgba(30, 41, 59, 0.75), rgba(15, 23, 42, 0.85)),
            url("inge.jpg");
background-size:cover;
background-position:center;
color:var(--gris-texto);
}

/* NAVBAR (NO MODIFICADO) */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 70px;
background: rgba(255, 255, 255, 0.08);
backdrop-filter: blur(12px);
position:relative;
}

.navbar::after{
content:"";
position:absolute;
bottom:0;
left:0;
width:100%;
height:2px;
background: linear-gradient(90deg, transparent, var(--azul-pastel), transparent);
background-size:200%;
box-shadow:
0 0 8px var(--azul-pastel),
0 0 15px rgba(147,197,253,0.6);
animation: neonLine 3s linear infinite;
}

@keyframes neonLine{
0%{ background-position:-200% 0; }
100%{ background-position:200% 0; }
}

/* LOGO */
.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo-img{
width:50px;
height:50px;
object-fit:contain;
}

.logo h2{ 
font-size:26px; 
color:var(--azul-pastel);
}

.logo p{ font-size:16px; opacity:0.8; }
.logo span{ font-size:13px; color:#9ca3af; }

/* MENÚ */
nav a{
color:var(--gris-texto);
text-decoration:none;
margin-left:30px;
font-weight:600;
font-size:18px;
position:relative;
}

nav a::after{
content:"";
position:absolute;
width:0%;
height:2px;
background:var(--azul-pastel);
left:0;
bottom:-5px;
transition:0.3s;
}

nav a:hover::after{ width:100%; }
nav .active{ color:var(--azul-pastel); }

/* CONTENEDOR */
.semanas-container{
width:90%;
max-width:1200px;
margin:30px auto;
background: rgba(255,255,255,0.05);
backdrop-filter: blur(15px);
padding:25px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.semanas-container h1{
text-align:center;
margin-bottom:15px;
color:#bfdbfe;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

/* TARJETAS */
.card{
background: rgba(255,255,255,0.05);
border-radius:12px;
padding:18px;
text-align:center;
cursor:pointer;
transition: all 0.3s ease;
border:1px solid rgba(147,197,253,0.15);
backdrop-filter: blur(8px);
}

.card h3{
color:#e0f2fe;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-content{
background: rgba(255,255,255,0.06);
backdrop-filter: blur(20px);
padding:40px;
width:60%;
max-width:700px;
border-radius:20px;
text-align:center;
color:var(--gris-texto);
position:relative;
}

/* BOTONES */
.btn-ver{
background: linear-gradient(45deg, var(--azul-pastel), var(--azul-medio));
padding:8px 14px;
border-radius:8px;
color:#0f172a;
text-decoration:none;
margin-right:8px;
cursor:pointer;
}

.btn-descargar{
background: rgba(255,255,255,0.1);
padding:8px 14px;
border-radius:8px;
color:white;
text-decoration:none;
}

/* VISOR PDF */
#visorPDF{
display:none;
margin-top:20px;
background:#000;
padding:10px;
border-radius:12px;
}

#visorPDF iframe{
width:100%;
height:500px;
border:none;
}

.cerrar-pdf{
background:red;
color:white;
padding:8px;
border:none;
margin-bottom:10px;
cursor:pointer;
}

</style>
</head>

<body>

<header class="navbar">
<div class="logo">
<h2>Base de Datos II</h2>
</div>

<nav>
<a href="index.html">🏠 Inicio</a>
<a href="#" class="active">📅 Semanas</a>
<a href="contacto.html">✉️ Contacto</a>
<a href="login.html">🔒 Login</a>
</nav>
</header>

<section class="semanas-container">

<h1>Actividades por Semanas</h1>

<div class="grid">
<script>
for(let i=1;i<=16;i++){
document.write(`
<div class="card" onclick="abrirModal(${i})">
<h3>Semana ${i}</h3>
<p>Ver archivos</p>
</div>
`)
}
</script>
</div>

</section>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">

<h2 id="tituloModal"></h2>
<div id="linksModal"></div>

<!-- VISOR PDF -->
<div id="visorPDF">
<button class="cerrar-pdf" onclick="cerrarPDF()">❌ Cerrar</button>
<iframe id="framePDF"></iframe>
</div>

</div>
</div>

<script>

/* 🔥 CAMBIO IMPORTANTE */
const BASE_URL = "https://github.com/GuadalupeEmanuel/BASE-DE-DATOS-II/raw/main/";

const semanas = {
1: [
    {
        nombre:"ARQUITECTURA DE BASE DE DATOS",
        archivo:"semana%201.pdf"
    }
]
};

function abrirModal(semana){

document.getElementById("modal").style.display="flex"

let ruta = BASE_URL + "semana" + semana + "/"
let contenido=""

if(semanas[semana]){

semanas[semana].forEach(file=>{

let url = ruta + file.archivo

contenido+=`
<div style="margin:10px 0;">
<b>${file.nombre}</b><br><br>

<button class="btn-ver" onclick="verPDF('${url}')">👁 Ver</button>

<a href="${url}" download class="btn-descargar">📥 Descargar</a>
</div>
`

})

}else{
contenido="<p>No hay archivos en esta semana</p>"
}

document.getElementById("tituloModal").innerHTML="📅 Semana "+semana
document.getElementById("linksModal").innerHTML=contenido

}

/* 🔥 VISOR CORREGIDO */
function verPDF(url){

let visor = "https://docs.google.com/gview?url=" + url + "&embedded=true";

document.getElementById("visorPDF").style.display="block";
document.getElementById("framePDF").src = visor;

}

/* CERRAR PDF */
function cerrarPDF(){
document.getElementById("visorPDF").style.display="none"
document.getElementById("framePDF").src=""
}

/* CERRAR MODAL */
window.onclick=function(e){
const modal=document.getElementById("modal")
if(e.target===modal){
modal.style.display="none"
}
}

</script>

</body>
</html>
