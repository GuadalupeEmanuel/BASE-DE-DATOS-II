<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Semanas - Base de Datos II</title>

<style>

/* TODO TU CSS ORIGINAL (NO LO TOQUÉ) */
:root{
--azul-pastel:#93c5fd;
--azul-medio:#60a5fa;
--fondo-oscuro:#0f172a;
--gris-texto:#d1d5db;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Segoe UI',sans-serif;
background: linear-gradient(rgba(30, 41, 59, 0.75), rgba(15, 23, 42, 0.85)),
            url("inge.jpg");
background-size:cover;
background-position:center;
color:var(--gris-texto);
}

/* NAVBAR (IGUAL) */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 70px;
background: rgba(255, 255, 255, 0.08);
backdrop-filter: blur(12px);
position:relative;
}

/* CONTENEDOR */
.semanas-container{
width:90%;
max-width:1200px;
margin:30px auto;
background: rgba(255,255,255,0.05);
backdrop-filter: blur(15px);
padding:25px;
border-radius:18px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
gap:20px;
}

/* CARD */
.card{
background: rgba(255,255,255,0.05);
border-radius:12px;
padding:18px;
text-align:center;
cursor:pointer;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-content{
background: rgba(255,255,255,0.06);
padding:30px;
width:70%;
border-radius:20px;
position:relative;
}

.close{
position:absolute;
top:10px;
right:20px;
cursor:pointer;
}

/* BOTONES */
.btn-ver{
background:#60a5fa;
padding:8px;
border-radius:8px;
color:black;
text-decoration:none;
margin-right:5px;
}

.btn-descargar{
background:#222;
padding:8px;
border-radius:8px;
color:white;
text-decoration:none;
}

/* 🔥 VISOR PDF */
#visorPDF{
margin-top:20px;
width:100%;
height:500px;
border-radius:10px;
display:none;
}

</style>
</head>

<body>

<header class="navbar">
<div class="logo">
<h2>Base de Datos II</h2>
</div>
</header>

<section class="semanas-container">
<h1>Actividades por Semanas</h1>

<div class="grid">
<script>
for(let i=1;i<=16;i++){
document.write(`
<div class="card" onclick="abrirModal(${i})">
<h3>Semana ${i}</h3>
<p>Ver archivos</p>
</div>
`)
}
</script>
</div>

</section>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<span class="close" onclick="cerrarModal()">✖</span>

<h2 id="tituloModal"></h2>
<div id="linksModal"></div>

<!-- 🔥 VISOR PDF -->
<iframe id="visorPDF"></iframe>

</div>
</div>

<script>

/* 🔥 CDN BUENO */
const BASE_URL = "https://cdn.jsdelivr.net/gh/GuadalupeEmanuel/BASE-DE-DATOS-II@main/";

/* TUS ARCHIVOS */
const semanas = {
1: [
    {
        nombre:"ARQUITECTURA DE BASE DE DATOS",
        archivo:"semana 1.pdf"
    }
]
};

function abrirModal(semana){

const modal = document.getElementById("modal")
modal.style.display = "flex"

const ruta = BASE_URL + "semana" + semana + "/"
let contenido=""

if(semanas[semana]){

semanas[semana].forEach(file=>{

let url = ruta + encodeURIComponent(file.archivo)

contenido+=`
<div style="margin:10px 0;">
<p><b>${file.nombre}</b></p>

<button class="btn-ver" onclick="verPDF('${url}')">👁 Ver</button>

<a href="${url}" download class="btn-descargar">📥 Descargar</a>
</div>
`

})

}else{
contenido="<p>No hay archivos</p>"
}

document.getElementById("tituloModal").innerHTML="Semana "+semana
document.getElementById("linksModal").innerHTML=contenido

}

/* 🔥 VER PDF SIN 404 */
function verPDF(url){
const visor = document.getElementById("visorPDF")
visor.style.display = "block"
visor.src = url
}

/* CERRAR */
function cerrarModal(){
document.getElementById("modal").style.display="none"
document.getElementById("visorPDF").style.display="none"
document.getElementById("visorPDF").src=""
}

</script>

</body>
</html>
