<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Semanas - Base de Datos II</title>

<style>

/* VARIABLES */
:root{
--azul-pastel:#93c5fd;
--azul-medio:#60a5fa;
--fondo-oscuro:#0f172a;
--gris-texto:#d1d5db;
}

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
background: linear-gradient(rgba(30, 41, 59, 0.75), rgba(15, 23, 42, 0.85)),
            url("inge.jpg");
background-size:cover;
background-position:center;
color:var(--gris-texto);
}

/* NAVBAR */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 70px;
background: rgba(255, 255, 255, 0.08);
backdrop-filter: blur(12px);
position:relative;
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo-img{
width:50px;
height:50px;
}

nav a{
color:var(--gris-texto);
text-decoration:none;
margin-left:30px;
font-weight:600;
}

/* CONTENEDOR */
.semanas-container{
width:90%;
max-width:1200px;
margin:30px auto;
background: rgba(255,255,255,0.05);
padding:25px;
border-radius:18px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
gap:20px;
}

/* TARJETAS */
.card{
background: rgba(255,255,255,0.05);
border-radius:12px;
padding:18px;
text-align:center;
cursor:pointer;
}

.card:hover{
transform:scale(1.05);
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-content{
background: rgba(255,255,255,0.06);
padding:40px;
width:60%;
border-radius:20px;
position:relative;
}

.close{
position:absolute;
top:15px;
right:20px;
cursor:pointer;
}

/* BOTONES */
.btn-ver{
background:#60a5fa;
padding:8px 14px;
border-radius:8px;
color:black;
text-decoration:none;
margin-right:8px;
}

.btn-descargar{
background:#0f172a;
padding:8px 14px;
border-radius:8px;
color:white;
border:1px solid white;
cursor:pointer;
}

/* ITEMS */
.modal-item{
margin:15px 0;
padding:15px;
background:rgba(255,255,255,0.05);
border-radius:12px;
display:flex;
justify-content:space-between;
}

</style>
</head>

<body>

<header class="navbar">
<div class="logo">
<img src="logo.png">
<div>
<h2>Base de Datos II</h2>
<p>Guadalupe Carbajal Emanuel Gaddiel</p>
</div>
</div>

<nav>
<a href="#">Inicio</a>
<a href="#">Semanas</a>
</nav>
</header>

<section class="semanas-container">
<h1>Actividades por Semanas</h1>

<div class="grid">
<script>
for(let i=1;i<=16;i++){
document.write(`
<div class="card" onclick="abrirModal(${i})">
<h3>Semana ${i}</h3>
<p>Ver archivos</p>
</div>
`)
}
</script>
</div>

</section>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<span class="close" onclick="cerrarModal()">✖</span>
<h2 id="tituloModal"></h2>
<div id="linksModal"></div>
</div>
</div>

<script>

/* CDN */
const BASE_URL = "https://cdn.jsdelivr.net/gh/GuadalupeEmanuel/BASE-DE-DATOS-II@main/";

/* ARCHIVOS */
const semanas = {
1: [
    {
        nombre: "ARQUITECTURA DE BASE DE DATOS",
        archivo: "semana1/semana1.pdf"
    }
]
};

/* 🔥 DESCARGA REAL */
function descargarArchivo(url, nombre){
fetch(url)
.then(res => res.blob())
.then(blob => {
const link = document.createElement("a")
link.href = URL.createObjectURL(blob)
link.download = nombre
link.click()
})
.catch(()=> alert("Error al descargar"))
}

/* MODAL */
function abrirModal(semana){

const modal = document.getElementById("modal")
modal.style.display = "flex"

let contenido=""

if(semanas[semana]){
semanas[semana].forEach(file=>{

let url = BASE_URL + file.archivo

contenido+=`
<div class="modal-item">
<div>
<p><b>📄 ${file.nombre}</b></p>
</div>
<div>
<a href="${url}" target="_blank" class="btn-ver">Ver</a>
<button onclick="descargarArchivo('${url}','${file.nombre}.pdf')" class="btn-descargar">
Descargar
</button>
</div>
</div>
`
})
}else{
contenido="<p>No hay archivos</p>"
}

document.getElementById("tituloModal").innerHTML="Semana "+semana
document.getElementById("linksModal").innerHTML=contenido
}

function cerrarModal(){
document.getElementById("modal").style.display="none"
}

</script>

</body>
</html>
