<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Unidades - Base de Datos II</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--primary:#ff3b3b;
--text:#e5e5e5;
--nav-h:80px;
}

/* 🌌 FONDO */
body{
font-family:'Segoe UI',sans-serif;
background:
radial-gradient(circle at 20% 20%, rgba(255,0,0,0.15), transparent 40%),
radial-gradient(circle at 80% 30%, rgba(255,140,0,0.15), transparent 40%),
#050505;
color:var(--text);
overflow-x:hidden;
cursor:none;
animation:pageIn .35s ease;
}

/* 🔥 ENTRADA DE PÁGINA */
@keyframes pageIn{
from{
opacity:0;
transform:translateY(-10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* 🔴 CURSOR */
.cursor-dot{
width:8px;
height:8px;
background:var(--primary);
border-radius:50%;
position:fixed;
transform:translate(-50%,-50%);
pointer-events:none;
z-index:9999;
box-shadow:0 0 10px var(--primary);
}

.cursor-outline{
width:28px;
height:28px;
border:2px solid rgba(255,59,59,0.6);
border-radius:50%;
position:fixed;
transform:translate(-50%,-50%);
pointer-events:none;
z-index:9998;
transition:0.08s ease;
}

/* NAVBAR + SLIDEDOWN */
.navbar{
position:fixed;
top:0;
width:100%;
height:var(--nav-h);
padding:0 60px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,0,0,0.2);
z-index:1000;
animation:slideDown .35s ease;
}

@keyframes slideDown{
from{
transform:translateY(-100%);
opacity:0;
}
to{
transform:translateY(0);
opacity:1;
}
}

/* LOGO */
.logo{display:flex;align-items:center;gap:12px;}
.logo img{width:45px;filter: drop-shadow(0 0 8px #ff3b3b);}
.logo-text h2{color:var(--primary);}
.logo-text p{font-size:12px;color:#aaa;}
.logo-text span{font-size:11px;color:#777;}

/* NAV */
nav a{
margin-left:25px;
text-decoration:none;
color:#aaa;
transition:.2s;
}

nav a:hover{color:var(--primary);}
nav .active{color:var(--primary);}

/* CONTENIDO */
.semanas-container{
padding-top:calc(var(--nav-h) + 30px);
max-width:950px;
margin:auto;
padding-left:20px;
padding-right:20px;
}

h1{
text-align:center;
margin-bottom:40px;
color:var(--primary);
}

/* UNIDADES */
.unidad{
margin-top:60px;
padding-left:15px;
border-left:3px solid rgba(255,59,59,0.3);
transition:.2s;
animation:fadeUp .4s ease;
}

.unidad:hover{
border-left:3px solid var(--primary);
transform:translateX(4px);
}

.unidad-numero{
font-size:15px;
color:#aaa;
letter-spacing:2px;
text-transform:uppercase;
}

.unidad-nombre{
font-size:30px;
font-weight:700;
color:var(--primary);
margin-bottom:12px;
}

/* SEMANAS */
.grid{
display:flex;
flex-direction:column;
border-left:2px solid rgba(255,0,0,0.2);
padding-left:15px;
gap:8px;
}

.card{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
cursor:pointer;
border-radius:8px;
transition:.2s;
position:relative;
}

.card:hover{
background:rgba(255,0,0,0.08);
transform:translateX(5px);
}

.card::before{
content:"";
position:absolute;
left:-15px;
top:50%;
transform:translateY(-50%);
width:7px;
height:7px;
background:var(--primary);
border-radius:50%;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
opacity:0;
transition:.15s ease;
}

.modal.show{display:flex;opacity:1;}

.modal-content{
position:relative;
background:#0f0f0f;
padding:25px;
width:60%;
max-height:80vh;
overflow-y:auto;
border-radius:12px;
border:1px solid rgba(255,0,0,0.25);
transform:scale(0.92);
transition:.15s ease;
}

.modal.show .modal-content{
transform:scale(1);
}

/* BOTÓN CERRAR */
.close-btn{
position:absolute;
top:10px;
right:10px;
font-size:16px;
color:var(--primary);
cursor:pointer;
padding:5px 8px;
border-radius:6px;
background:rgba(255,0,0,0.08);
transition:.2s;
}

.close-btn:hover{
background:var(--primary);
color:#000;
}

/* ARCHIVOS */
.modal-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
margin-bottom:8px;
border-radius:8px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.05);
animation:fadeUp .25s ease forwards;
opacity:0;
transform:translateY(8px);
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.btn-ver{
padding:5px 10px;
border-radius:6px;
background:rgba(255,59,59,0.15);
color:var(--primary);
text-decoration:none;
transition:.2s;
}

.btn-ver:hover{
background:var(--primary);
color:#000;
}

</style>
</head>

<body>

<!-- CURSOR -->
<div class="cursor-dot"></div>
<div class="cursor-outline"></div>

<header class="navbar">
<div class="logo">
<img src="logo.png">
<div class="logo-text">
<h2>Base de Datos II</h2>
<p>Guadalupe Carbajal Emanuel</p>
<span>UPLA - Huancayo</span>
</div>
</div>

<nav>
<a href="index.html">Inicio</a>
<a href="#" class="active">Unidades</a>
<a href="contacto.html">Contacto</a>
<a href="login.html">Login</a>
</nav>
</header>

<section class="semanas-container">
<h1>Actividades por Semanas</h1>
<div id="contenido"></div>
</section>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<span class="close-btn" onclick="cerrarModal()">✖</span>
<h2 id="tituloModal"></h2>
<div id="linksModal"></div>
</div>
</div>

<script>

/* CURSOR */
const dot=document.querySelector(".cursor-dot");
const outline=document.querySelector(".cursor-outline");

document.addEventListener("mousemove",e=>{
dot.style.left=e.clientX+"px";
dot.style.top=e.clientY+"px";

outline.style.left=e.clientX+"px";
outline.style.top=e.clientY+"px";
});

/* DATA */
const BASE_URL="https://cdn.jsdelivr.net/gh/GuadalupeEmanuel/BASE-DE-DATOS-II@main/";

const semanas = {
    
1:[{nombre:"Arquitectura de Base de Datos",archivo:"semana1/semana11.pdf"}],
2:[
{nombre:"Análisis Técnico",archivo:"semana2/semana2.pdf"},
{nombre:"Diagrama",archivo:"semana2/semana22.pdf"},
{nombre:"Instalación de SQL",archivo:"semana2/semana222.pdf"},
{nombre:"Diagrama 2",archivo:"semana2/semana2222.pdf"}
],
3:[
{nombre:"Ejercicio 1",archivo:"semana3/semana3.pdf"},
{nombre:"Ejercicio 2",archivo:"semana3/semana33.pdf"},
{nombre:"aquitectura de base de datos y sus aplicaciones",archivo:"semana3/semana333.pdf"},
],
4:[
{nombre:"arquitectura de base de datos y normalizacion",archivo:"semana4/semana4.pdf"},
{nombre:"Boleta",archivo:"semana4/semana44.pdf"},
],
5:[{nombre:"Normalización de Datos",archivo:"semana5/semana5.pdf"}],
6:[{nombre:"Álgebra Relacional",archivo:"semana6/semana6.pdf"}],
7:[{nombre:"SQL Básico",archivo:"semana7/semana7.pdf"}],
8:[{nombre:"SQL Avanzado",archivo:"semana8/semana8.pdf"}],
9:[{nombre:"Procedimientos",archivo:"semana9/semana9.pdf"}],
10:[{nombre:"Triggers",archivo:"semana10/semana10.pdf"}],
11:[{nombre:"Funciones",archivo:"semana11/semana11.pdf"}],
12:[{nombre:"Transacciones",archivo:"semana12/semana12.pdf"}],
13:[{nombre:"Seguridad",archivo:"semana13/semana13.pdf"}],
14:[{nombre:"Optimización",archivo:"semana14/semana14.pdf"}],
15:[{nombre:"Administración BD",archivo:"semana15/semana15.pdf"}],
16:[{nombre:"Proyecto Final",archivo:"semana16/semana16.pdf"}]
};

const unidades=[
{nombre:"Arquitectura BD",inicio:1,fin:4},
{nombre:"Diseño",inicio:5,fin:8},
{nombre:"SQL",inicio:9,fin:12},
{nombre:"Admin BD",inicio:13,fin:16}
];

const cont=document.getElementById("contenido");

unidades.forEach((u,i)=>{
let html=`<div class="unidad">
<div class="unidad-numero">Unidad ${i+1}</div>
<div class="unidad-nombre">${u.nombre}</div>
<div class="grid">`;

for(let s=u.inicio;s<=u.fin;s++){
html+=`
<div class="card" onclick="abrirModal(${s})">
<h3>Semana ${s}</h3>
<p>Ver archivos</p>
</div>`;
}

html+=`</div></div>`;
cont.innerHTML+=html;
});

/* MODAL */
function abrirModal(semana){
const modal=document.getElementById("modal");
const links=document.getElementById("linksModal");

document.getElementById("tituloModal").innerText="Semana "+semana;

let html="";
semanas[semana].forEach((f,i)=>{
html+=`
<div class="modal-item" style="animation-delay:${i*0.05}s">
<div>${f.nombre}</div>
<a class="btn-ver" href="${BASE_URL+f.archivo}" target="_blank">Ver</a>
</div>`;
});

links.innerHTML=html;

modal.classList.add("show");
modal.style.display="flex";
}

function cerrarModal(){
const modal=document.getElementById("modal");
modal.classList.remove("show");
setTimeout(()=>modal.style.display="none",150);
}

window.onclick=e=>{
if(e.target.id==="modal") cerrarModal();
};

document.addEventListener("keydown",e=>{
if(e.key==="Escape") cerrarModal();
});

</script>

</body>
</html>
