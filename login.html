<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - Panel Administrativo</title>

<style>

/* 🎨 PALETA ORIGINAL */
:root{
--bg-main:#020617;
--bg-secondary:#0f172a;
--card-bg:rgba(15,23,42,0.7);

--primary:#38bdf8;
--secondary:#a855f7;

--text-main:#e2e8f0;
--text-soft:#cbd5f5;
--text-muted:#94a3b8;

--border:rgba(56,189,248,0.2);
--glow:rgba(56,189,248,0.4);

--cyber:#ff3b3b;
--cyber2:#ff8c00;
}

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* BODY */
body{
font-family:'Segoe UI',sans-serif;
background: radial-gradient(circle at 50% 20%, #1a0000, #000000 70%);
color:var(--text-main);
cursor:none;
overflow-x:hidden;
}

/* CURSOR */
.cursor-dot{
width:8px;
height:8px;
background:var(--cyber);
border-radius:50%;
position:fixed;
transform:translate(-50%,-50%);
pointer-events:none;
z-index:9999;
box-shadow:0 0 10px var(--cyber);
}

.cursor-outline{
width:30px;
height:30px;
border:2px solid rgba(255,59,59,0.6);
border-radius:50%;
position:fixed;
transform:translate(-50%,-50%);
pointer-events:none;
z-index:9998;
transition:0.08s ease;
}

/* NAVBAR */
.navbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 60px;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,59,59,0.3);
z-index:1000;
}

/* LOGO */
.logo{
display:flex;
align-items:center;
gap:15px;
}

/* 🔴 LOGO CON RESALTADO ROJO (LO QUE PEDISTE) */
.logo img{
width:45px;
height:45px;
object-fit:contain;
display:block;
filter:
drop-shadow(0 0 8px var(--cyber))
drop-shadow(0 0 15px rgba(255,59,59,0.6));
}

/* TEXTO LOGO */
.logo-text h2{
color:var(--cyber);
text-shadow:0 0 10px var(--cyber);
}

.logo-text p{
color:#aaa;
}

.logo-text span{
color:#aaa;
font-size:12px;
}

/* MENU */
nav a{
margin-left:25px;
color:#aaa;
text-decoration:none;
transition:0.3s;
}

nav a:hover{
color:var(--cyber);
text-shadow:0 0 10px var(--cyber);
}

/* CUADRO LOGIN */
.container{
width:420px;
margin:140px auto 50px;

background:rgba(0,0,0,0.65);
backdrop-filter: blur(15px);

padding:35px;
border-radius:20px;

border:1px solid rgba(255,59,59,0.25);
box-shadow:0 0 25px rgba(255,59,59,0.15);

opacity:0;
transform:translateY(20px);
animation:fadeUp 0.8s ease forwards;
}

/* TITULO */
.titulo{
color:var(--cyber);
text-shadow:0 0 10px var(--cyber);
}

/* INPUTS */
input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
background:rgba(2,6,23,0.7);
color:var(--text-main);
}

/* BOTON */
button{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,var(--cyber),var(--cyber2));
color:#000;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 0 15px var(--cyber);
}

/* PANEL */
.panel,.opcion{
background:rgba(0,0,0,0.5);
border:1px solid rgba(255,59,59,0.2);
padding:10px;
margin-top:8px;
border-radius:10px;
}

.opcion:hover{
background:rgba(255,59,59,0.1);
box-shadow:0 0 10px var(--cyber);
}

/* ANIMACIONES */
@keyframes fadeUp{
to{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body>

<!-- CURSOR -->
<div class="cursor-dot"></div>
<div class="cursor-outline"></div>

<!-- NAVBAR -->
<header class="navbar">

<div class="logo">
<img src="logo.png">
<div class="logo-text">
<h2>Base de Datos II</h2>
<p>Guadalupe Carbajal Emanuel</p>
<span>UPLA - Huancayo</span>
</div>
</div>

<nav>
<a href="index.html">Inicio</a>
<a href="semanas.html">Semanas</a>
<a href="contacto.html"> Contacto</a>
<a href="#">Login</a>
</nav>

</header>

<!-- LOGIN -->
<section class="container">

<div id="loginBox">

<div class="titulo">🔐 Panel Administrativo</div>

<form id="loginForm">

<input type="text" id="usuario" placeholder="Usuario">
<input type="password" id="password" placeholder="Contraseña">

<button type="submit">Iniciar Sesión</button>

</form>

<div id="mensaje"></div>

</div>

<div id="panelAdmin" class="panel" style="display:none">

<h3>Bienvenido</h3>

<div class="opcion">Editar Contenido</div>
<div class="opcion">Gestionar Enlaces</div>
<div class="opcion">Cambiar Imágenes</div>

<button onclick="cerrarSesion()">Cerrar Sesión</button>

</div>

</section>

<script>

/* LOGIN */
const form=document.getElementById("loginForm");
const msg=document.getElementById("mensaje");

form.addEventListener("submit",e=>{
e.preventDefault();

if(usuario.value==="admin" && password.value==="admin123"){
loginBox.style.display="none";
panelAdmin.style.display="block";
}else{
msg.innerHTML="❌ Incorrecto";
msg.style.color="red";
}
});

/* CURSOR */
const dot=document.querySelector(".cursor-dot");
const outline=document.querySelector(".cursor-outline");

document.addEventListener("mousemove",e=>{
dot.style.left=e.clientX+"px";
dot.style.top=e.clientY+"px";

outline.style.left=e.clientX+"px";
outline.style.top=e.clientY+"px";
});

function cerrarSesion(){
panelAdmin.style.display="none";
loginBox.style.display="block";
form.reset();
msg.innerHTML="";
}

</script>

</body>
</html>
